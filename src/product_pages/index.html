<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sleep Outside | Product Detail</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>

<body>
  <header id="main-header"></header>

  <main class="divider">
    <section class="product-detail">
      <h3 id="productBrand">Brand</h3>
      <h2 id="productName" class="divider">Product Name</h2>
      <img id="productImage" class="divider" src="" alt="" />
      <p id="productPrice" class="product-card__price"></p>
      <p id="discountFlag" class="discount-flag" style="display:none;"></p>
      <p id="productColor" class="product__color"></p>
      <p id="productDescription" class="product__description"></p>
      <div class="product-detail__add">
        <button id="addToCart">Add to Cart</button>
      </div>
    </section>
  </main>

  <footer id="main-footer"></footer>

  <script type="module" src="/js/product.js"></script>
</body>

</html>
